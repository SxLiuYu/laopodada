name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- Backend ----------
  api:
    name: laopodada-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laopodada-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: laopodada-api/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import smoke check
        env:
          LAOPODADA_DATA_DIR: /tmp/laopodada-smoke
        run: |
          mkdir -p /tmp/laopodada-smoke/db /tmp/laopodada-smoke/images/{original,list,thumb}
          python -c "import app, os; print('import ok, routes:', sorted([r.rule for r in app.app.url_map.iter_rules()]))"

      - name: Start gunicorn in background
        run: |
          gunicorn -c gunicorn.conf.py app:app &
          echo $! > /tmp/gunicorn.pid
          sleep 2

      - name: Health check
        run: |
          curl -fsS http://127.0.0.1:8097/health

      - name: End-to-end CRUD smoke test
        run: |
          set -e
          # Create a tiny test image
          python -c "
          from PIL import Image
          Image.new('RGB', (400, 300), 'lightblue').save('/tmp/ci.jpg', 'JPEG')
          "

          # POST upload
          RESP=$(curl -fsS -X POST http://127.0.0.1:8097/api/v1/items \
            -F 'file=@/tmp/ci.jpg' -F 'category=top' -F 'title=ci测试')
          echo "POST response: $RESP"
          ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['item']['id'])")
          echo "Created id: $ID"

          # GET list
          curl -fsS http://127.0.0.1:8097/api/v1/items | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['count']>=1, d; print('list ok, count=', d['count'])"

          # GET one
          curl -fsS http://127.0.0.1:8097/api/v1/items/$ID | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['id']=='$ID', d; print('get ok, title=', d['title'])"

          # Verify thumbnail serves a real JPEG
          curl -fsS http://127.0.0.1:8097/api/v1/items/$ID | python3 -c "
          import sys,json,urllib.request
          d=json.load(sys.stdin)
          for label in ('thumbnail_url','list_url','original_url'):
            with urllib.request.urlopen(d[label]) as r:
              head=r.read(3)
              assert head[:3]==b'\xff\xd8\xff', f'{label} not JPEG'
              print(f'{label} ok, status={r.status}, len={r.headers.get(\"Content-Length\")}')
          "

          # DELETE
          curl -fsS -X DELETE http://127.0.0.1:8097/api/v1/items/$ID
          echo
          # Confirm gone
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8097/api/v1/items/$ID)
          [ "$HTTP" = "404" ] && echo "post-delete 404 ok" || (echo "expected 404, got $HTTP"; exit 1)

      - name: Stop gunicorn
        if: always()
        run: |
          [ -f /tmp/gunicorn.pid ] && kill $(cat /tmp/gunicorn.pid) 2>/dev/null || true

  # ---------- iOS static syntax check ----------
  ios:
    name: laopodada-ios (syntax)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laopodada-ios
    steps:
      - uses: actions/checkout@v4

      # swiftc is available on Ubuntu's swift toolchain
      - uses: swatinem/setup-swift@v1
        with:
          swift-version: "5.9"

      - name: Parse-only syntax check
        # -parse flag: lex+parse, no typecheck, no codegen. Catches syntax errors only.
        # On Linux swift toolchain, UIKit/SwiftUI symbols are not available so we use
        # -parse-ast (and tolerate unresolved identifier messages — those are NOT syntax errors).
        run: |
          for f in $(find Sources -name '*.swift'); do
            out=$(swiftc -parse "$f" 2>&1 || true)
            # Real syntax errors say "error:" not "cannot find" or "no such module"
            if echo "$out" | grep -E ":[0-9]+:[0-9]+: error:" | grep -vE "cannot find|no such module|has no member" > /dev/null; then
              echo "SYNTAX ERROR in $f:"
              echo "$out" | grep -E ":[0-9]+:[0-9]+: error:" | head -10
              exit 1
            fi
          done
          echo "syntax pass done"

  # ---------- Lint py ----------
  py-lint:
    name: python lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laopodada-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.5.0
      - run: ruff check app.py gunicorn.conf.py
