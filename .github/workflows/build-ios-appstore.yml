name: Build iOS App Store (Capacitor)

"on":
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.5)'
        required: true
        default: '1.0.5'

jobs:
  build-ios-appstore:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Xcode
        run: |
          ls /Applications/ | grep -i xcode
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install npm dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Cap sync (web assets → ios)
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Bump version
        working-directory: ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" App/Info.plist

      - name: Archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee /tmp/archive.log | tail -40

      - name: Export IPA
        working-directory: ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ios \
            -exportOptionsPlist exportOptions.plist \
            2>&1 | tee /tmp/export.log | tail -20

      - name: Build IPA
        run: |
          echo "=== Searching for .app ==="
          APP=$(find ios/App/build -name "*.app" -type d | head -1)
          echo "Found: $APP"
          if [ -z "$APP" ]; then
            echo "ERROR: No .app found!"
            find ios/App/build -type f
            exit 1
          fi
          echo "=== Creating IPA with Python ==="
          python -c "
          import zipfile, os, shutil
          app = '$APP'
          payload = 'Payload/' + os.path.basename(app)
          os.makedirs('Payload', exist_ok=True)
          shutil.copytree(app, payload)
          with zipfile.ZipFile('laopodada.ipa', 'w', zipfile.ZIP_DEFLATED) as zf:
              for root, dirs, files in os.walk('Payload'):
                  for f in files:
                      zf.write(os.path.join(root, f), os.path.join('Payload', root[len('Payload'):], f))
          shutil.rmtree('Payload')
          print('IPA created successfully')
          "
          ls -la laopodada.ipa
          echo "=== Done ==="

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-ipa-${{ github.event.inputs.version }}
          path: laopodada.ipa
          retention-days: 30
          if-no-files-found: error
