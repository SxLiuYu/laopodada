name: Build iOS App Store (Capacitor)

"on":
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.5)'
        required: true
        default: '1.0.5'

jobs:
  build-ios-appstore:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Xcode
        run: |
          ls /Applications/ | grep -i xcode
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install npm dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Cap sync (web assets → ios)
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Bump version
        working-directory: ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" App/Info.plist

      - name: Archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "${GITHUB_WORKSPACE}/ios/App/build/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee /tmp/archive.log | tail -80

      - name: Verify archive
        run: |
          test -d "${GITHUB_WORKSPACE}/ios/App/build/App.xcarchive" && echo "xcarchive OK" || echo "xcarchive MISSING"
          ls "${GITHUB_WORKSPACE}/ios/App/build/App.xcarchive/Products/"

      - name: Export IPA
        working-directory: ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath "${GITHUB_WORKSPACE}/ios/App/build/App.xcarchive" \
            -exportPath "${GITHUB_WORKSPACE}/ios/App/build/ios" \
            -exportOptionsPlist exportOptions.plist \
            2>&1 | tee /tmp/export.log

      - name: Create IPA
        run: |
          cd "${GITHUB_WORKSPACE}/ios/App/build/ios"
          ls -la
          APP_FILE=$(ls *.app 2>/dev/null | head -1)
          echo "App: $APP_FILE"
          if [ -z "$APP_FILE" ]; then
            echo "ERROR: No .app found in build/ios"
            ls -la
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_FILE" Payload/
          cd "${GITHUB_WORKSPACE}"
          zip -r laopodada.ipa Payload/
          rm -rf Payload
          ls -la laopodada.ipa
          file laopodada.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-ipa-${{ github.event.inputs.version }}
          path: laopodada.ipa
          retention-days: 30
          if-no-files-found: error
