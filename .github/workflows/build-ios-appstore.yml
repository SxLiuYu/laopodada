name: Build iOS App Store (Capacitor)

"on":
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.5)'
        required: true
        default: '1.0.5'

jobs:
  build-ios-appstore:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Xcode
        run: |
          ls /Applications/ | grep -i xcode
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install npm dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Cap sync (web assets → ios)
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Bump version
        working-directory: ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" App/Info.plist

      - name: Archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee /tmp/archive.log | tail -40

      - name: Export IPA
        working-directory: ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ios \
            -exportOptionsPlist exportOptions.plist \
            2>&1 | tee /tmp/export.log | tail -20

      - name: Find .app
        id: find_app
        working-directory: ios/App
        run: |
          echo "=== Searching for .app in build/ ==="
          APP=$(find build -name "*.app" -type d 2>/dev/null | head -1)
          echo "found=$APP"
          if [ -z "$APP" ]; then
            echo "=== build/ contents ==="
            find build -type f 2>/dev/null
            echo "=== All dirs ==="
            ls -laR build/ios/ 2>/dev/null || echo "no build/ios/"
            exit 1
          fi
          echo "app_path=ios/App/$APP" >> "$GITHUB_OUTPUT"
          echo "Found: ios/App/$APP"

      - name: Build IPA
        run: |
          echo "=== Running Python IPA creator ==="
          python3 scripts/create_ipa.py "${{ steps.find_app.outputs.app_path }}" "${GITHUB_WORKSPACE}/laopodada.ipa"
          echo "=== Done ==="

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-ipa-${{ github.event.inputs.version }}
          path: laopodada.ipa
          retention-days: 30
          if-no-files-found: error
