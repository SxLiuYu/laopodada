name: Build iOS App Store (Capacitor)

"on":
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.5)'
        required: true
        default: '1.0.5'

jobs:
  build-ios-appstore:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Xcode
        run: |
          ls /Applications/ | grep -i xcode
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install npm dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Cap sync (web assets → ios)
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Bump version
        working-directory: ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" App/Info.plist

      - name: Archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="match AppStore com.laopodada.app" \
            | tail -80

      - name: Export IPA
        working-directory: ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ios \
            -exportOptionsPlist exportOptions.plist

      - name: Find IPA
        run: |
          echo "=== Searching for IPA ==="
          find ios/App/build -name "*.ipa" -type f 2>/dev/null || echo "No .ipa found"
          echo "=== Searching for .app ==="
          find ios/App/build -name "*.app" -type f 2>/dev/null || echo "No .app found"
          echo "=== Directory listing ==="
          ls -laR ios/App/build/ios/ 2>/dev/null || echo "No ios/ dir"
          ls -laR ios/App/build/ 2>/dev/null | head -40

      - name: Copy IPA to root
        run: |
          IPA_PATH=$(find ios/App/build -name "*.ipa" -type f | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No .ipa file found!"
            exit 1
          fi
          echo "Found IPA: $IPA_PATH"
          cp "$IPA_PATH" ./laopodada.ipa
          ls -la ./laopodada.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-ipa-${{ github.event.inputs.version }}
          path: laopodada.ipa
          retention-days: 30
          if-no-files-found: error
