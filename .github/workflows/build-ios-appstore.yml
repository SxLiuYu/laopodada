name: Build iOS App Store (Capacitor)

"on":
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.5)'
        required: true
        default: '1.0.5'

jobs:
  build-ios-appstore:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Bump version
        working-directory: ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" App/Info.plist

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build IPA
        working-directory: ios/App
        run: |
          npx cap build ios --no-open --no-deploy

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-ipa-${{ github.event.inputs.version }}
          path: ios/App/App.ipa
          retention-days: 30
          if-no-files-found: warn
