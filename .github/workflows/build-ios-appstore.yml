name: Build iOS App Store (Capacitor)

"on":
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.5)'
        required: true
        default: '1.0.5'

jobs:
  build-ios-appstore:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Xcode
        run: |
          ls /Applications/ | grep -i xcode
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install npm dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Cap sync (web assets → ios)
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Bump version
        working-directory: ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" App/Info.plist

      - name: Archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee /tmp/archive.log | tail -40

      - name: Export IPA
        working-directory: ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ios \
            -exportOptionsPlist exportOptions.plist \
            2>&1 | tee /tmp/export.log | tail -20

      - name: Debug output
        working-directory: ios/App
        run: |
          echo "=== Archive files ==="
          find build/App.xcarchive -type f 2>/dev/null | head -20
          echo "=== Export files ==="
          find build/ios -type f 2>/dev/null | head -20
          echo "=== All under build/ ==="
          find build -type f 2>/dev/null | head -40

      - name: Build IPA from xcarchive
        run: |
          XCARCHIVE="/home/runner/work/laopodada/laopodada/ios/App/build/App.xcarchive"
          echo "Checking xcarchive exists: $(test -d $XCARCHIVE && echo yes || echo no)"
          echo "Products/Applications:"
          ls -la "$XCARCHIVE/Products/Applications/" 2>/dev/null || echo "NOT FOUND"
          
          APP=$(ls "$XCARCHIVE/Products/Applications/"*.app 2>/dev/null | head -1)
          echo "Found app: $APP"
          if [ -z "$APP" ]; then
            echo "ERROR: No .app in xcarchive"
            find "$XCARCHIVE" -name "*.app" 2>/dev/null
            exit 1
          fi
          
          mkdir -p Payload
          cp -r "$APP" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload /home/runner/work/laopodada/laopodada/laopodada.ipa
          ls -la /home/runner/work/laopodada/laopodada/laopodada.ipa
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-ipa-${{ github.event.inputs.version }}
          path: laopodada.ipa
          retention-days: 30
          if-no-files-found: error
