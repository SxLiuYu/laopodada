name: Build iOS App Store (Capacitor)

"on":
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.5)'
        required: true
        default: '1.0.5'

jobs:
  build-ios-appstore:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Xcode
        run: |
          ls /Applications/ | grep -i xcode
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install npm dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Cap sync (web assets → ios)
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Bump version
        working-directory: ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" App/Info.plist

      - name: Archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee /tmp/archive.log

      - name: Export IPA
        working-directory: ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ios \
            -exportOptionsPlist exportOptions.plist \
            2>&1 | tee /tmp/export.log

      - name: Build IPA payload
        working-directory: ios/App/build/ios
        run: |
          echo "=== Files in build/ios ==="
          ls -la
          echo "=== App bundle ==="
          ls *.app
          mkdir -p Payload
          cp -r *.app Payload/
          cd "${GITHUB_WORKSPACE}"
          ditto -c -k --sequesterRsrc --keepParent ios/App/build/ios/Payload laopodada.ipa
          ls -la laopodada.ipa
          file laopodada.ipa
          rm -rf ios/App/build/ios/Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-ipa-${{ github.event.inputs.version }}
          path: laopodada.ipa
          retention-days: 30
          if-no-files-found: error
