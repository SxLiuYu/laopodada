name: Build iOS (Capacitor)

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'ios/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.5)'
        required: false
        default: '1.0.5'

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Cap sync (web assets → ios)
        run: npx cap sync ios

      - name: Fix code signing in Xcode project
        run: |
          # Disable automatic code signing for CI
          pbxproj_path="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' $pbxproj_path
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' $pbxproj_path
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' $pbxproj_path
          echo "Updated code signing settings"

      - name: Build iOS app
        working-directory: ios/App
        run: |
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            | tee /tmp/xcodebuild.log

      - name: Create IPA from build
        run: |
          echo "=== Finding built .app ==="
          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "App.app" -type d 2>/dev/null | sort -r | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No App.app found in DerivedData"
            ls -la /Users/runner/Library/Developer/Xcode/DerivedData/ 2>/dev/null || echo "DerivedData not found"
            exit 1
          fi
          echo "Found App.app at: $APP_PATH"
          
          # Create IPA (IPA is just a zip with Payload/App.app)
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr App.ipa Payload/
          rm -rf Payload
          
          echo "=== IPA created ==="
          ls -lh App.ipa
          
          # Save path for upload
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "IPA_PATH=$(pwd)/App.ipa" >> $GITHUB_ENV

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-ios
          path: App.ipa
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: /tmp/xcodebuild.log
          retention-days: 3
          if-no-files-found: warn
