name: Build iOS

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'cordova/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.3'

      - name: Install Cordova dependencies
        run: npm install
        working-directory: ./cordova

      # iOS platform files are already in the repo (committed in this same workflow)
      # No need to re-add — xcodebuild uses the checked-out files directly

      - name: Pod install (CocoaPods)
        run: |
          cd cordova/platforms/ios
          pod install
        continue-on-error: true

      - name: Build iOS .app (xcodebuild for simulator)
        run: |
          cd cordova/platforms/ios
          xcodebuild -workspace 老婆哒哒.xcworkspace \
            -scheme 老婆哒哒 \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package .app into zip
        run: |
          cd cordova/platforms/ios
          # The .app bundle lives in build/Build/Products/Release-iphonesimulator/
          zip -r /tmp/ios-build.zip build/Build/Products/Release-iphonesimulator/老婆哒哒.app

      - name: Upload iOS build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: /tmp/ios-build.zip
          retention-days: 3
          if-no-files-found: error