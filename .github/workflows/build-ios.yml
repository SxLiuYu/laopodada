name: Build iOS (Capacitor)

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'ios/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.5)'
        required: false
        default: '1.0.5'

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Cap sync (web assets → ios)
        run: npx cap sync ios

      - name: Fix code signing in Xcode project
        run: |
          # Disable automatic code signing for CI
          pbxproj_path="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' $pbxproj_path
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' $pbxproj_path
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' $pbxproj_path
          echo "Updated code signing settings"

      - name: Build iOS app
        working-directory: ios/App
        run: |
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            | tee /tmp/xcodebuild.log

      - name: Check build output
        run: |
          echo "=== Searching for .app ==="
          find /Users/runner/Library/Developer/Xcode/DerivedData -name "App.app" -type d 2>/dev/null | head -5
          find ios/App -name "App.app" -type d 2>/dev/null | head -5
          echo "=== Build log (last 50 lines) ==="
          tail -50 /tmp/xcodebuild.log 2>/dev/null || echo "No log found"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: /tmp/xcodebuild.log
          retention-days: 3
          if-no-files-found: warn
