name: Build Android APK (Capacitor)

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Install npm dependencies (override .npmrc to use official registry)
        timeout-minutes: 10
        env:
          npm_config_registry: https://registry.npmjs.org/
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          echo "=== npm config before install ==="
          npm config get registry
          echo "=== before install ==="
          ls -la
          echo "=== install (official registry) ==="
          npm install --no-audit --no-fund 2>&1 | tail -30
          echo "=== after install ==="
          ls -la node_modules/.bin/cap 2>&1 || echo "CAP MISSING"
          ls node_modules/@capacitor/ 2>&1 || echo "CAP DIR MISSING"

      - name: Verify cap binary
        run: |
          ls -la node_modules/.bin/cap 2>&1 || echo "CAP MISSING from .bin"
          ls -la node_modules/@capacitor/cli/bin/capacitor 2>&1 || echo "CAP CLI BIN MISSING"
          node node_modules/@capacitor/cli/bin/capacitor --version

      - name: Cap sync (web assets → android)
        run: node node_modules/@capacitor/cli/bin/capacitor sync android --verbose

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (unsigned)
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-release-apk
          path: android/app/build/outputs/apk/release/
          if-no-files-found: warn
          retention-days: 7
