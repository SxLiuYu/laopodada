name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'cordova/**'
      - '.github/workflows/build-android.yml'

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 7.6.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6.4'

      - name: Install dependencies
        run: npm install

      - name: Install Cordova dependencies
        run: npm install
        working-directory: ./cordova

      - name: Remove existing Android platform
        run: rm -rf cordova/platforms/android

      - name: Add Android platform (pin 11.0.0)
        run: npx cordova platform add android@11.0.0
        working-directory: ./cordova

      - name: Build Android APK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
          cd cordova/platforms/android
          # cordova-android@11.0.0 doesn't ship gradlew; generate it from gradle.properties template
          gradle wrapper --gradle-version 7.6.4 --distribution-type bin
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1
        continue-on-error: true

      - name: Upload unsigned APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: cordova/platforms/android/app/build/outputs/apk/release/
          retention-days: 3