name: Build Android APK (Capacitor)

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Install npm dependencies (override .npmrc to use official registry)
        timeout-minutes: 10
        env:
          npm_config_registry: https://registry.npmjs.org/
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          echo "=== npm config before install ==="
          npm config get registry
          echo "=== npm/node versions ==="
          npm --version
          node --version
          echo "=== before install ==="
          ls -la
          echo "=== install (official registry) ==="
          npm install --no-audit --no-fund --include=dev 2>&1 | tail -40
          echo "=== after install ==="
          echo "--- top-level node_modules ---"
          ls -la node_modules/ 2>&1 | head -30
          echo "--- .bin/cap ---"
          ls -la node_modules/.bin/cap 2>&1 || echo "CAP MISSING from .bin"
          echo "--- @capacitor contents ---"
          ls -la node_modules/@capacitor/ 2>&1 || echo "CAP DIR MISSING"
          echo "--- @capacitor/cli/bin ---"
          ls -la node_modules/@capacitor/cli/bin/ 2>&1 || echo "CAP CLI BIN MISSING"
          echo "--- find any capacitor executable ---"
          find node_modules -name "capacitor" -type f 2>/dev/null | head -5

      - name: Verify cap binary
        continue-on-error: true
        run: |
          ls -la node_modules/.bin/cap 2>&1 || echo "CAP MISSING from .bin"
          ls -la node_modules/@capacitor/cli/bin/capacitor 2>&1 || echo "CAP CLI BIN MISSING"
          (./node_modules/.bin/cap --version 2>&1 || true) | head -5
          (node node_modules/@capacitor/cli/bin/capacitor --version 2>&1 || true) | head -5

      - name: Cap sync (web assets → android)
        run: |
          echo "=== Running cap sync android ==="
          (node node_modules/@capacitor/cli/bin/capacitor sync android; echo "EXIT=$?") 2>&1 | tee /tmp/cap-sync.log
          echo "=== Log dump ==="
          cat /tmp/cap-sync.log
          echo "=== End log ==="

      - name: Configure APK signing
        working-directory: android/app
        run: |
          # Create debug keystore
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" 2>&1 || echo "Keystore creation skipped"
          fi
          echo "=== Keystore created ==="
          ls -la debug.keystore
          echo "=== Keystore info ==="
          keytool -list -v -keystore debug.keystore -storepass android -alias androiddebugkey 2>&1 | head -10

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-debug.log
          echo "=== Debug APKs ==="
          find app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "No debug APKs"

      - name: Sign Debug APK with apksigner
        run: |
          DEBUG_APK=$(find android/app/build/outputs/apk/debug -name "*.apk" -type f | head -1)
          if [ -z "$DEBUG_APK" ]; then
            echo "ERROR: No debug APK found"
            find android/app/build/outputs/apk -name "*.apk" 2>/dev/null
            exit 1
          fi
          echo "=== Signing: $DEBUG_APK ==="
          echo "=== Keystore exists? ==="
          ls -la android/app/debug.keystore || echo "Keystore NOT FOUND!"
          
          # Find apksigner dynamically
          APKSIGNER=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -r | head -1)/apksigner
          echo "=== Using apksigner at: $APKSIGNER ==="
          if [ ! -f "$APKSIGNER" ]; then
            echo "ERROR: apksigner not found at $APKSIGNER"
            ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "build-tools dir missing"
            exit 1
          fi
          
          $APKSIGNER sign \
            --ks android/app/debug.keystore \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            "$DEBUG_APK"
          
          echo "=== Verification ==="
          $APKSIGNER verify --verbose "$DEBUG_APK" 2>&1 | head -15
          ls -lh "$DEBUG_APK"

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-release.log
          echo "=== Release APKs ==="
          find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "No release APKs"

      - name: Sign Release APK with apksigner
        run: |
          RELEASE_APK=$(find android/app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          if [ -z "$RELEASE_APK" ]; then
            echo "ERROR: No release APK found"
            find android/app/build/outputs/apk -name "*.apk" 2>/dev/null
            exit 1
          fi
          echo "=== Signing: $RELEASE_APK ==="
          echo "=== Keystore exists? ==="
          ls -la android/app/debug.keystore || echo "Keystore NOT FOUND!"
          
          # Find apksigner dynamically
          APKSIGNER=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -r | head -1)/apksigner
          echo "=== Using apksigner at: $APKSIGNER ==="
          if [ ! -f "$APKSIGNER" ]; then
            echo "ERROR: apksigner not found at $APKSIGNER"
            ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "build-tools dir missing"
            exit 1
          fi
          
          $APKSIGNER sign \
            --ks android/app/debug.keystore \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            "$RELEASE_APK"
          
          echo "=== Verification ==="
          $APKSIGNER verify --verbose "$RELEASE_APK" 2>&1 | head -15
          ls -lh "$RELEASE_APK"

      - name: List generated APKs
        run: |
          echo "=== Debug APKs ==="
          find android/app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "No debug APKs"
          echo "=== Release APKs ==="
          find android/app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "No release APKs"

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 14
