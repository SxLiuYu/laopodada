name: Build Android APK (Capacitor)

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Install npm dependencies (override .npmrc to use official registry)
        timeout-minutes: 10
        env:
          npm_config_registry: https://registry.npmjs.org/
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          echo "=== npm config before install ==="
          npm config get registry
          echo "=== npm/node versions ==="
          npm --version
          node --version
          echo "=== before install ==="
          ls -la
          echo "=== install (official registry) ==="
          npm install --no-audit --no-fund --include=dev 2>&1 | tail -40
          echo "=== after install ==="
          echo "--- top-level node_modules ---"
          ls -la node_modules/ 2>&1 | head -30
          echo "--- .bin/cap ---"
          ls -la node_modules/.bin/cap 2>&1 || echo "CAP MISSING from .bin"
          echo "--- @capacitor contents ---"
          ls -la node_modules/@capacitor/ 2>&1 || echo "CAP DIR MISSING"
          echo "--- @capacitor/cli/bin ---"
          ls -la node_modules/@capacitor/cli/bin/ 2>&1 || echo "CAP CLI BIN MISSING"
          echo "--- find any capacitor executable ---"
          find node_modules -name "capacitor" -type f 2>/dev/null | head -5

      - name: Verify cap binary
        continue-on-error: true
        run: |
          ls -la node_modules/.bin/cap 2>&1 || echo "CAP MISSING from .bin"
          ls -la node_modules/@capacitor/cli/bin/capacitor 2>&1 || echo "CAP CLI BIN MISSING"
          (./node_modules/.bin/cap --version 2>&1 || true) | head -5
          (node node_modules/@capacitor/cli/bin/capacitor --version 2>&1 || true) | head -5

      - name: Cap sync (web assets → android)
        run: |
          echo "=== Running cap sync android ==="
          (node node_modules/@capacitor/cli/bin/capacitor sync android; echo "EXIT=$?") 2>&1 | tee /tmp/cap-sync.log
          echo "=== Log dump ==="
          cat /tmp/cap-sync.log
          echo "=== End log ==="

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          (./gradlew assembleDebug --no-daemon --stacktrace; echo "EXIT=$?") 2>&1 | tee /tmp/gradle-debug.log
          echo "=== Log dump (last 200) ==="
          tail -200 /tmp/gradle-debug.log
          echo "=== End log ==="

      - name: Upload gradle debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-debug-log
          path: /tmp/gradle-debug.log
          if-no-files-found: warn
          retention-days: 1

      - name: Build Release APK (unsigned)
        working-directory: android
        continue-on-error: true
        run: |
          (./gradlew assembleRelease --no-daemon --stacktrace; echo "EXIT=$?") 2>&1 | tee /tmp/gradle-release.log
          echo "=== Release log dump (last 100) ==="
          tail -100 /tmp/gradle-release.log
          echo "=== End log ==="

      - name: Verify APK output
        run: |
          echo "=== Search for APK (any location) ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== expected path /android/app/build/outputs/apk/debug/ ==="
          ls -la android/app/build/outputs/apk/debug/ 2>&1 || echo "DIR MISSING"
          echo "=== broader: /android/app/build/outputs/apk/ ==="
          ls -la android/app/build/outputs/apk/ 2>&1 || echo "APK DIR MISSING"
          echo "=== broader: /android/app/build/ ==="
          find android/app/build -name "*.apk" 2>&1 || echo "NO APK in build/"
          echo "=== broader: /android/app/build/outputs/ ==="
          find android/app/build/outputs -type f 2>&1 | head -20
          echo "=== save debug to file ==="
          {
            echo "=== Run $GITHUB_RUN_ID ==="
            echo "=== Verify APK output ==="
            find . -name "*.apk" 2>/dev/null
            echo "--- outputs/ tree ---"
            find android/app/build/outputs -type f 2>&1 | head -20
            echo "--- gradle-debug.log ---"
            cat /tmp/gradle-debug.log 2>&1 | tail -150
            echo "--- gradle-release.log ---"
            cat /tmp/gradle-release.log 2>&1 | tail -50
          } > /tmp/CI-DEBUG.md
          ls -la /tmp/CI-DEBUG.md

      - name: Commit debug log to ci-debug-logs branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@users.noreply.github.com"
          git checkout --orphan ci-debug-logs 2>/dev/null || git checkout ci-debug-logs
          git rm -rf . 2>/dev/null || true
          cp /tmp/CI-DEBUG.md DEBUG-LOG.md
          git add DEBUG-LOG.md
          git commit -m "ci-debug: run $GITHUB_RUN_ID sha $GITHUB_SHA" 2>&1
          git push -f origin ci-debug-logs 2>&1 | tail -5
          echo "=== committed ==="

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-debug-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/**/*.apk
            android/app/build/**/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laopodada-release-apk
          path: android/app/build/outputs/apk/release/
          if-no-files-found: warn
          retention-days: 7
